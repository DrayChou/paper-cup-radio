name: Build desktop packages

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: Publish a GitHub Release after build
        required: false
        default: false
        type: boolean
      release_tag:
        description: Release tag to publish (required when publish_release is true)
        required: false
        type: string
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'scripts/**'
      - 'src/**'
      - 'public/**'
      - 'desktop-host/**'
      - '.github/workflows/build-desktop.yml'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.9.0

      - name: Install ImageMagick
        run: brew install imagemagick

      - name: Install npm dependencies
        run: npm ci

      - name: Build web and server
        run: |
          npm run check
          npm run build

      - name: Build macOS app
        working-directory: desktop-host
        run: |
          deno task check
          deno task build

      - name: Archive macOS app
        working-directory: desktop-host/dist
        run: |
          ditto -c -k --sequesterRsrc --keepParent PaperCupRadio.app PaperCupRadio-macos-app.zip

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: PaperCupRadio-macos-app
          path: desktop-host/dist/PaperCupRadio-macos-app.zip
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.9.0

      - name: Install ImageMagick
        shell: powershell
        run: choco install imagemagick -y --no-progress

      - name: Install npm dependencies
        run: npm ci

      - name: Build web and server
        run: |
          npm run check
          npm run build

      - name: Build Windows MSI
        working-directory: desktop-host
        shell: powershell
        run: |
          deno task check
          if (Test-Path .\dist\windows) { Remove-Item -Recurse -Force .\dist\windows }
          New-Item -ItemType Directory -Force -Path .\dist\windows | Out-Null
          deno task build:win-msi

      - name: Upload Windows MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: PaperCupRadio-windows-msi
          path: desktop-host/dist/windows/PaperCupRadio.msi
          if-no-files-found: error

      - name: Build Windows directory package
        working-directory: desktop-host
        shell: powershell
        run: |
          if (Test-Path .\dist\windows) { Remove-Item -Recurse -Force .\dist\windows }
          New-Item -ItemType Directory -Force -Path .\dist\windows | Out-Null
          deno task build:win

      - name: Smoke test Windows directory package
        shell: powershell
        run: |
          $pkgDir = Join-Path $PWD 'desktop-host\dist\windows\PaperCupRadio'
          $launcher = Join-Path $pkgDir 'PaperCupRadio.bat'
          $stdout = Join-Path $env:RUNNER_TEMP 'paper-cup-radio-win-stdout.log'
          $stderr = Join-Path $env:RUNNER_TEMP 'paper-cup-radio-win-stderr.log'
          if (Test-Path $stdout) { Remove-Item $stdout -Force }
          if (Test-Path $stderr) { Remove-Item $stderr -Force }
          $proc = Start-Process -FilePath $launcher -WorkingDirectory $pkgDir -RedirectStandardOutput $stdout -RedirectStandardError $stderr -PassThru
          Start-Sleep -Seconds 12
          $proc.Refresh()
          Write-Host 'launcher stdout:'
          if (Test-Path $stdout) { Get-Content $stdout }
          Write-Host 'launcher stderr:'
          if (Test-Path $stderr) { Get-Content $stderr }
          if ($proc.HasExited) {
            throw "PaperCupRadio exited early with code $($proc.ExitCode)"
          }
          taskkill /PID $proc.Id /T /F | Out-Null
          Start-Sleep -Seconds 3

      - name: Archive Windows directory
        shell: powershell
        run: |
          Start-Sleep -Seconds 2
          Compress-Archive -Path 'desktop-host/dist/windows/PaperCupRadio/*' -DestinationPath 'desktop-host/dist/windows/PaperCupRadio-windows-dir.zip' -Force

      - name: Upload Windows directory artifact
        uses: actions/upload-artifact@v4
        with:
          name: PaperCupRadio-windows-dir
          path: desktop-host/dist/windows/PaperCupRadio-windows-dir.zip
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.9.0

      - name: Install ImageMagick
        run: sudo apt-get update && sudo apt-get install -y imagemagick zip

      - name: Install npm dependencies
        run: npm ci

      - name: Build web and server
        run: |
          npm run check
          npm run build

      - name: Build Linux packages
        working-directory: desktop-host
        run: |
          deno task check
          deno task build:linux-appimage
          deno task build:linux-deb
          deno task build:linux-rpm

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PaperCupRadio-linux-packages
          path: |
            desktop-host/dist/linux/PaperCupRadio.AppImage
            desktop-host/dist/linux/paper-cup-radio.deb
            desktop-host/dist/linux/paper-cup-radio.rpm
          if-no-files-found: error

  publish-release:
    needs:
      - build-macos
      - build-windows
      - build-linux
    if: startsWith(github.ref, 'refs/tags/v') || inputs.publish_release == true
    runs-on: ubuntu-latest
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: PaperCupRadio-macos-app
          path: release-assets

      - name: Download Windows directory artifact
        uses: actions/download-artifact@v4
        with:
          name: PaperCupRadio-windows-dir
          path: release-assets

      - name: Download Windows MSI artifact
        uses: actions/download-artifact@v4
        with:
          name: PaperCupRadio-windows-msi
          path: release-assets

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: PaperCupRadio-linux-packages
          path: release-assets

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ inputs.release_tag }}" ]; then
            echo "value=${{ inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "release_tag input is required when publish_release is true" >&2
            exit 1
          fi

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            release-assets/PaperCupRadio-macos-app.zip
            release-assets/PaperCupRadio-windows-dir.zip
            release-assets/PaperCupRadio.msi
            release-assets/PaperCupRadio.AppImage
            release-assets/paper-cup-radio.deb
            release-assets/paper-cup-radio.rpm
